<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — SecureIM</title>
  <meta name="description" content="Sign in to SecureIM, the zero-trust end-to-end encrypted messaging platform.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css?v={{ v }}">
</head>
<body>
<div class="mesh-bg"></div>
<div class="auth-page">
  <div class="auth-card glass-card">

    <div class="auth-logo">
      <div class="auth-logo-icon">🔒</div>
      <div class="auth-logo-text">Secure<span>IM</span></div>
    </div>

    <!-- ── Login Form ───────────────────────────────────── -->
    <div id="login-form-wrap">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your encrypted account</p>

      <form id="login-form" autocomplete="off" novalidate>
        <div class="field">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" placeholder="your_username" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <div id="login-status" class="status-msg"></div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-mt">
          <span class="spinner"></span>
          <span class="btn-text">Sign In</span>
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Create one</a>
      </div>
    </div>

  </div>
</div>

<script src="/static/js/crypto.js?v={{ v }}"></script>
<script src="/static/js/storage.js?v={{ v }}"></script>
<script src="/static/js/auth.js?v={{ v }}"></script>
</body>
</html>
