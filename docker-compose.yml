services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_ENV=production
      - SOCKETIO_ASYNC_MODE=gevent
      - MLWAF_ENABLED=true
      - MLWAF_URL=http://mlwaf:8001
    volumes:
      - db_data:/app/instance       # persist SQLite DB
    expose:
      - "5000"
    depends_on:
      - redis
      - mlwaf
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/login')"]
      interval: 30s
      timeout: 10s
      retries: 3

  mlwaf:
    image: python:3.11-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./ml-waf:/app
      - waf_models:/app/models
    command: >
      bash -c "pip install -r requirements.txt -q &&
               python -m ml.train &&
               uvicorn app.main:app --host 0.0.0.0 --port 8001"
    expose:
      - "8001"
    environment:
      - CROWDSEC_API_KEY=${CROWDSEC_API_KEY:-}
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro       # Mount TLS certificates here
    depends_on:
      - web

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
  waf_models:
