upstream secureim {
    server web:5000;
    # For Socket.IO sticky sessions with multiple workers, use ip_hash:
    # ip_hash;
}

server {
    listen 80;
    server_name _;
    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # TLS — place your certificates in ./certs/
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # Security headers (nginx-level additions)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Max upload size
    client_max_body_size 10M;

    # Static files — served directly by nginx (faster than Flask)
    location /static/ {
        alias /app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket upgrade for Socket.IO
    location /socket.io/ {
        proxy_pass         http://secureim;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;    # Keep WS connections alive
    }

    # All other requests → gunicorn
    location / {
        proxy_pass         http://secureim;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }
}
