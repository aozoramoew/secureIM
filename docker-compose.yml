services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_ENV=production
      - SOCKETIO_ASYNC_MODE=gevent
    volumes:
      - db_data:/app/instance       # persist SQLite DB
    expose:
      - "5000"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/login')"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro       # Mount TLS certificates here
    depends_on:
      - web

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
