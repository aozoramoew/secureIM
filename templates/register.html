<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — SecureIM</title>
  <meta name="description" content="Create your SecureIM account — end-to-end encrypted messaging with zero-knowledge security.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css?v={{ v }}">
</head>
<body>
<div class="mesh-bg"></div>
<div class="auth-page">
  <div class="auth-card glass-card">

    <div class="auth-logo">
      <div class="auth-logo-icon">🔒</div>
      <div class="auth-logo-text">Secure<span>IM</span></div>
    </div>

    <!-- ── Register Form ─────────────────────────────────── -->
    <div id="register-form-wrap">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Keys are generated on your device. We never see your messages.</p>

      <form id="register-form" autocomplete="off" novalidate>
        <div class="field">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" placeholder="choose_a_username"
                 autocomplete="username" minlength="3" maxlength="30" required>
        </div>
        <div class="field">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="min 8 characters"
                 autocomplete="new-password" minlength="8" required>
          <div class="password-strength">
            <div class="password-strength-bar" id="strength-bar"></div>
          </div>
        </div>
        <div class="field">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="repeat password"
                 autocomplete="new-password" required>
        </div>

        <div id="reg-status" class="status-msg"></div>

        <button type="submit" id="reg-btn" class="btn btn-primary btn-mt">
          <span class="spinner"></span>
          <span class="btn-text">Create Account</span>
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>

  </div>
</div>

<script src="/static/js/crypto.js?v={{ v }}"></script>
<script src="/static/js/storage.js?v={{ v }}"></script>
<script src="/static/js/auth.js?v={{ v }}"></script>
</body>
</html>
